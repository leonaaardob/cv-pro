services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cvpro
      POSTGRES_USER: cvpro
      POSTGRES_PASSWORD: cvpro_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://cvpro:cvpro_dev@postgres:5432/cvpro
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
